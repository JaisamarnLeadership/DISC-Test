        @keyframes fadeIn {
            from {

                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {

            }
        }

            height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
            position: relative;

        }

        .radio-btn:checked {
            border-color: #6366f1;
            background-color: #ffffff;
        }

        .radio-btn:checked::after {
            content: '';

            top: 4px;
            left: 4px;
            width: 12px;
            height: 12px;

        function StatsCharts() {
            const chartInstances = useRef({});
            const [isLoading, setIsLoading] = useState(true);
            const [statsError, setStatsError] = useState(null);
            const [summaryData, setSummaryData] = useState(null);
            const [chartData, setChartData] = useState(null);

            const loadStats = React.useCallback(() => {
                setIsLoading(true);
                setStatsError(null);

                fetch(SCRIPT_URL + '?read=true')
                    .then(res => res.text())
                    .then(text => {
                        try { return JSON.parse(text); }
                        catch (e) { throw new Error('ข้อมูลจาก Google Sheets ไม่ถูกต้อง'); }
                    })
                    .then(history => {
                        setIsLoading(false);
                        if (!history || history.length === 0) {
                            setChartData({ discCounts: { 'D': 0, 'I': 0, 'S': 0, 'C': 0 }, sectionByDisc: {}, genderByDisc: {}, roleByDisc: {} });
                            return;
                        }

                        const discCounts = { 'D': 0, 'I': 0, 'S': 0, 'C': 0 };
                        const sectionByDisc = {
                            'J1': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'J2': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'J3': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'NGM': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'OASIS': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'รามคำแหง': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'อื่นๆ': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 }
                        };
                        const genderByDisc = {
                            'ชาย': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'หญิง': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 }
                        };
                        const roleByDisc = {
                            'ศิษยาภิบาล': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'ผู้ปกครอง': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'หัวหน้าเขตและผู้ช่วย': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'หัวหน้าหน่วยและผู้ช่วย': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'หัวหน้าเซลล์และผู้ช่วย': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 },
                            'พี่เลี้ยง': { 'D': 0, 'I': 0, 'S': 0, 'C': 0 }
                        };

                        history.forEach(item => {
                            let itemDominant = item.dominantType;
                            if (itemDominant && typeof itemDominant === 'string') {
                                if (itemDominant.includes('M:')) {
                                    const match = itemDominant.match(/M:\s*([DISC])/);
                                    if (match) itemDominant = match[1];
                                }
                            }
                            if (!itemDominant) {
                                const d = Number(item.Score_D) || 0, i = Number(item.Score_I) || 0,
                                    s = Number(item.Score_S) || 0, c = Number(item.Score_C) || 0;
                                const maxVal = Math.max(d, i, s, c);
                                if (maxVal > 0) {
                                    if (d === maxVal) itemDominant = 'D';
                                    else if (i === maxVal) itemDominant = 'I';
                                    else if (s === maxVal) itemDominant = 'S';
                                    else if (c === maxVal) itemDominant = 'C';
                                }
                            }
                            if (itemDominant && discCounts[itemDominant] !== undefined) {
                                discCounts[itemDominant]++;
                                if (item.Section && sectionByDisc[item.Section]) sectionByDisc[item.Section][itemDominant]++;
                                if (item.Gender && genderByDisc[item.Gender]) genderByDisc[item.Gender][itemDominant]++;
                                let itemRole = item.Role || item.role;
                                if (itemRole) {
                                    itemRole = itemRole.trim();
                                    if (itemRole.includes('อาจารย์/ผู้รับใช้เต็มเวลา')) itemRole = 'อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา';
                                    if (roleByDisc[itemRole]) roleByDisc[itemRole][itemDominant]++;
                                }
                            }
                        });
                        setChartData({ discCounts, sectionByDisc, genderByDisc, roleByDisc });
                    })
                    .catch(err => {
                        console.error('Stats error:', err);
                        setStatsError('ไม่สามารถโหลดข้อมูลสถิติได้\n(เปิดจากไฟล์ในเครื่องโดยตรงอาจไม่รองรับ — ลองเปิดผ่าน GitHub Pages แทน)');
                        setIsLoading(false);
                    });
            }, []);

            useEffect(() => {
                loadStats();
            }, [loadStats]);

            useEffect(() => {
                if (!chartData) return;

                setTimeout(() => {
                    // ทำลายกราฟเดิมถ้ามี
                    Object.values(chartInstances.current).forEach(chart => {
                        if (chart && typeof chart.destroy === 'function') {
                            chart.destroy();
                        }
                    });
                    chartInstances.current = {};

                    const commonOptions = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    };

                    const barOptions = {
                        ...commonOptions,
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } },
                            x: { grid: { display: false } }
                        }
                    };

                    const stackedBarOptions = {
                        ...commonOptions,
                        plugins: {
                            ...commonOptions.plugins,
                            legend: { display: true, position: 'bottom', labels: { padding: 10, usePointStyle: true, pointStyle: 'circle' } }
                        },
                        scales: {
                            x: { stacked: true, grid: { display: false }, border: { display: false } },
                            y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } }
                        }
                    };

                    const ctxTotalDisc = document.getElementById('chart-total-disc');
                    if (ctxTotalDisc) {
                        chartInstances.current.cTotalDisc = new Chart(ctxTotalDisc, {
                            type: 'bar',
                            data: {
                                labels: ['D', 'I', 'S', 'C'],
                                datasets: [{
                                    label: 'จำนวนคน',
                                    data: [chartData.discCounts['D'], chartData.discCounts['I'], chartData.discCounts['S'], chartData.discCounts['C']],
                                    backgroundColor: '#6366f1',
                                    borderRadius: 6, maxBarThickness: 50
                                }]
                            },
                            options: barOptions
                        });
                    }

                    const sectionColors = {
                        'J1': '#00FFFF',
                        'J2': '#00008B',
                        'J3': '#5D3FD3',
                        'NGM': '#CCCCFF',
                        'OASIS': '#40B5AD',
                        'รามคำแหง': '#f59e0b',
                        'อื่นๆ': '#64748b'
                    };

                    const ctxSectionDisc = document.getElementById('chart-section-disc');
                    if (ctxSectionDisc) {
                        const datasets = Object.keys(chartData.sectionByDisc).map(section => ({
                            label: section,
                            data: ['D', 'I', 'S', 'C'].map(disc => chartData.sectionByDisc[section][disc]),
                            backgroundColor: sectionColors[section] || '#cbd5e1',
                            borderRadius: 0,
                            maxBarThickness: 50
                        }));

                        chartInstances.current.cSectionDisc = new Chart(ctxSectionDisc, {
                            type: 'bar',
                            data: { labels: ['D', 'I', 'S', 'C'], datasets: datasets },
                            options: stackedBarOptions
                        });
                    }

                    const roleColors = {
                        'ศิษยาภิบาล': '#40E0D0',
                        'ผู้ปกครอง': '#0437F2',
                        'อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา': '#4682B4',
                        'หัวหน้าเขตและผู้ช่วย': '#9FE2BF',
                        'หัวหน้าหน่วยและผู้ช่วย': '#96DED1',
                        'หัวหน้าเซลล์และผู้ช่วย': '#5D3FD3',
                        'พี่เลี้ยง': '#CCCCFF'
                    };

                    const ctxRoleDisc = document.getElementById('chart-role-disc');
                    if (ctxRoleDisc) {
                        const datasets = Object.keys(chartData.roleByDisc).map(role => ({
                            label: role,
                            data: ['D', 'I', 'S', 'C'].map(disc => chartData.roleByDisc[role][disc]),
                            backgroundColor: roleColors[role] || '#cbd5e1',
                            borderRadius: 0,
                            maxBarThickness: 50
                        }));

                        chartInstances.current.cRoleDisc = new Chart(ctxRoleDisc, {
                            type: 'bar',
                            data: { labels: ['D', 'I', 'S', 'C'], datasets: datasets },
                            options: stackedBarOptions
                        });
                    }

                    ['D', 'I', 'S', 'C'].map(disc => {
                        const ctxGenderDisc = document.getElementById(`chart-gender-${disc}`);
                        if (ctxGenderDisc) {
                            const maleCount = chartData.genderByDisc['ชาย'][disc] || 0;
                            const femaleCount = chartData.genderByDisc['หญิง'][disc] || 0;

                            chartInstances.current[`cGender${disc}`] = new Chart(ctxGenderDisc, {
                                type: 'doughnut',
                                data: {
                                    labels: ['ผู้ชาย', 'ผู้หญิง'],
                                    datasets: [{
                                        data: [maleCount, femaleCount],
                                        backgroundColor: ['#a5b4fc', '#38bdf8'],
                                        borderWidth: 2,
                                        borderColor: '#ffffff'
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    cutout: '65%',
                                    plugins: { legend: { display: false } }
                                }
                            });
                        }
                    });
                }, 100);

                return () => {
                    Object.values(chartInstances.current).forEach(chart => {
                        if (chart && typeof chart.destroy === 'function') {
                            chart.destroy();
                        }
                    });
                };
            }, [chartData]);

            return (
                <div className="mt-12 border-t border-slate-200 pt-10">
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <h2 className="text-xl sm:text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <svg className="w-6 h-6 text-indigo-600 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                            สถิติผลการทดสอบ DISC คริสตจักรใจสมาน
                        </h2>
                        <button
                            onClick={loadStats}
                            disabled={isLoading}
                            className={`flex items-center gap-1.5 px-4 py-2 text-xs sm:text-sm font-semibold rounded-lg border transition-all ${isLoading
                                ? 'bg-slate-50 text-slate-400 border-slate-200 cursor-not-allowed'
                                : 'bg-white hover:bg-slate-50 text-indigo-600 border-indigo-200 hover:border-indigo-300 shadow-sm active:scale-95'
                                }`}
                        >
                            <svg className={`w-4 h-4 ${isLoading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3m0 0l3 3m-3-3v8"></path>
                            </svg>
                            {isLoading ? 'กำลังโหลด...' : 'รีเฟรชข้อมูลสถิติ'}
                        </button>
                    </div>

                    {isLoading && (
                        <div className="text-center py-10">
                            <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
                            <p className="mt-3 text-slate-500 text-sm">กำลังคำนวณข้อมูลสถิติ...</p>
                        </div>
                    )}

                    {statsError && (
                        <div className="p-5 bg-slate-50 rounded-xl border border-slate-200 text-center shadow-inner mb-6">
                            <p className="text-slate-600 text-sm mb-3 font-medium">{statsError}</p>
                            <button
                                onClick={loadStats}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-5 rounded-lg text-xs sm:text-sm shadow active:scale-95 transition-all"
                            >
                                โหลดข้อมูลสถิติใหม่อีกครั้ง
                            </button>
                        </div>
                    )}

                    {!isLoading && !statsError && chartData && (
                        <div className="mb-6 bg-indigo-50/50 p-5 rounded-xl border border-indigo-100 shadow-sm">
                            <h3 className="text-center font-bold mb-4 text-slate-700 text-sm uppercase tracking-wider">จำนวนผู้ประเมินตามบุคลิกเด่น</h3>
                            <div className="grid grid-cols-4 gap-3 text-center">
                                {Object.entries(chartData.discCounts).map(([trait, count]) => (
                                    <div key={trait} className="bg-white p-3 rounded-lg border border-slate-200/80 shadow-sm">
                                        <div className="text-xl font-extrabold text-indigo-700">{trait}</div>
                                        <div className="text-lg font-extrabold text-slate-800">{count}</div>
                                        <div className="text-[10px] sm:text-xs text-slate-500">คน</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className={`space-y-8 ${isLoading || statsError ? 'hidden' : ''}`}>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex flex-col items-center hover:shadow-md transition">
                                <h3 className="text-center font-semibold mb-4 text-slate-700">1. จำนวนผู้ที่เป็น DISC (รวมทั้งหมด)</h3>
                                <div className="relative w-full h-64 flex justify-center">
                                    <canvas id="chart-total-disc"></canvas>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex flex-col items-center hover:shadow-md transition">
                                <h3 className="text-center font-semibold mb-4 text-slate-700">2. แบ่งตาม "ส่วน" (แยกตามกลุ่ม DISC)</h3>
                                <div className="relative w-full h-64 flex justify-center">
                                    <canvas id="chart-section-disc"></canvas>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex flex-col items-center hover:shadow-md transition md:col-span-2">
                                <h3 className="text-center font-semibold mb-4 text-slate-700">3. แบ่งตาม "บทบาท/ตำแหน่งที่รับใช้" (แยกตามกลุ่ม DISC)</h3>
                                <div className="relative w-full h-64 md:h-80 flex justify-center">
                                    <canvas id="chart-role-disc"></canvas>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition">
                            <h3 className="text-center font-semibold mb-6 text-slate-700">4. สัดส่วนชาย-หญิง แยกตามกลุ่ม DISC</h3>
                            <div className="flex justify-center items-center gap-6 mb-6">
                                <div className="flex items-center gap-2"><span className="w-4 h-4 rounded-full bg-[#a5b4fc]"></span><span className="text-sm font-semibold text-slate-600">ผู้ชาย</span></div>
                                <div className="flex items-center gap-2"><span className="w-4 h-4 rounded-full bg-[#38bdf8]"></span><span className="text-sm font-semibold text-slate-600">ผู้หญิง</span></div>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {['D', 'I', 'S', 'C'].map(disc => (
                                    <div key={disc} className="flex flex-col items-center p-4 bg-slate-50/50 border border-slate-100 rounded-xl">
                                        <div className="font-bold text-lg text-indigo-800 mb-3">กลุ่ม {disc}</div>
                                        <div className="relative w-full h-32 flex justify-center">
                                            <canvas id={`chart-gender-${disc}`}></canvas>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            // answers[groupId] = { m: 'id', l: 'id' }
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(() => {
                const savedSubmitted = localStorage.getItem('disc_submitted');
                return savedSubmitted === 'true';
            });
            const [results, setResults] = useState(() => {
                const savedResults = localStorage.getItem('disc_results');
                return savedResults ? JSON.parse(savedResults) : null;
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isCapturing, setIsCapturing] = useState(false);
            const [capturedImage, setCapturedImage] = useState(null);

            const [userInfo, setUserInfo] = useState(() => {
                const savedUserInfo = localStorage.getItem('disc_userInfo');
                return savedUserInfo ? JSON.parse(savedUserInfo) : {
                    fullName: '',
                    nickname: '',
                    role: '',
                    section: '',
                    gender: '',
                    ageRange: ''
                };
            });
            const [formError, setFormError] = useState('');

            // จัดกลุ่มคำถาม
            const groups = useMemo(() => {
                const map = new Map();
                discData.forEach(item => {
                    if (!map.has(item.group)) {
                        map.set(item.group, []);
                    }
                    map.get(item.group).push(item);
                });
                return Array.from(map.values());
            }, []);

            const handleSelect = (groupId, itemId, type) => {
                setAnswers(prev => {
                    const currentGroup = prev[groupId] || { m: null, l: null };

                    // ถ้าเลือก M และไปซ้ำกับ L ของบรรทัดเดียวกัน ให้ยกเลิก L
                    // ถ้าเลือก L และไปซ้ำกับ M ของบรรทัดเดียวกัน ให้ยกเลิก M
                    const newGroup = { ...currentGroup, [type]: itemId };

                    if (type === 'm' && newGroup.l === itemId) newGroup.l = null;
                    if (type === 'l' && newGroup.m === itemId) newGroup.m = null;

                    return { ...prev, [groupId]: newGroup };
                });
            };

            const calculateResults = () => {
                // Validation
                if (!userInfo.fullName || !userInfo.nickname || !userInfo.role || !userInfo.section || !userInfo.gender || !userInfo.ageRange) {
                    setFormError('กรุณากรอกข้อมูลผู้ทำแบบทดสอบให้ครบถ้วนก่อนส่งคำตอบ');
                    window.scrollTo(0, 0);
                    return;
                }

                // ตรวจสอบว่าทำครบทุกข้อหรือไม่
                const totalGroups = new Set(discData.map(i => i.group)).size;
                if (Object.keys(answers).length < totalGroups) {
                    setFormError(`กรุณาตอบคำถามให้ครบทุกข้อ (คุณทำไปแล้ว ${Object.keys(answers).length} จาก ${totalGroups} ข้อ)`);
                    window.scrollTo(0, 0);
                    return;
                }

                let allAnswered = true;
                Object.values(answers).forEach(ans => {
                    if (!ans.m || !ans.l) allAnswered = false;
                });

                if (!allAnswered) {
                    setFormError('กรุณาเลือกทั้ง M และ L ในทุกกลุ่มคำถาม');
                    window.scrollTo(0, 0);
                    return;
                }

                setFormError('');
                setIsSubmitting(true);

                const scoresM = { D: 0, I: 0, S: 0, C: 0, X: 0 };
                const scoresL = { D: 0, I: 0, S: 0, C: 0, X: 0 };
                const diffScores = { D: 0, I: 0, S: 0, C: 0 };

                const selectedItems = [];

                Object.entries(answers).forEach(([groupIdStr, groupAns]) => {
                    const groupId = parseInt(groupIdStr);

                    if (groupAns.m) {
                        const item = discData.find(i => i.id === groupAns.m);
                        if (item) {
                            selectedItems.push({ ...item, type: 'M', result: item.m });
                            scoresM[item.m]++;
                        }
                    }
                    if (groupAns.l) {
                        const item = discData.find(i => i.id === groupAns.l);
                        if (item) {
                            selectedItems.push({ ...item, type: 'L', result: item.l });
                            scoresL[item.l]++;
                        }
                    }
                });

                ['D', 'I', 'S', 'C', 'X'].forEach(trait => {
                    diffScores[trait] = scoresM[trait] - scoresL[trait];
                });

                // Calculate Dominant DISC Type based on highest score of M and highest score of L (using only D, I, S, C)
                let maxM = -999;
                let dominantM = '';
                ['D', 'I', 'S', 'C'].forEach(trait => {
                    if (scoresM[trait] > maxM) {
                        maxM = scoresM[trait];
                        dominantM = trait;
                    }
                });

                let maxL = -999;
                let dominantL = '';
                ['D', 'I', 'S', 'C'].forEach(trait => {
                    if (scoresL[trait] > maxL) {
                        maxL = scoresL[trait];
                        dominantL = trait;
                    }
                });

                const dominantType = `M: ${dominantM} / L: ${dominantL}`;

                // เรียง selectedItems ตาม group
                selectedItems.sort((a, b) => a.group - b.group);

                // Prepare data for Google Sheets
                const resultData = {
                    fullName: userInfo.fullName,
                    nickname: userInfo.nickname,
                    role: userInfo.role,
                    section: userInfo.section,
                    gender: userInfo.gender,
                    ageRange: userInfo.ageRange,
                    scores: diffScores,
                    Score_D: diffScores.D,
                    Score_I: diffScores.I,
                    Score_S: diffScores.S,
                    Score_C: diffScores.C,
                    Score_X: diffScores.X,
                    X_Score: diffScores.X,
                    dominantType: dominantType,
                    date: new Date().toISOString()
                };

                // Send data to Google Sheets API
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    // Sending as plain text avoids CORS preflight issues
                    body: JSON.stringify(resultData),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    }
                }).then(() => {
                    console.log('Saved to Google Sheets successfully');
                }).catch((error) => {
                    console.error('Error saving data:', error);
                }).finally(() => {
                    setIsSubmitting(false);
                    const finalResults = { scoresM, scoresL, diffScores, selectedItems, dominantType };
                    setResults(finalResults);
                    setSubmitted(true);
                    localStorage.setItem('disc_submitted', 'true');
                    localStorage.setItem('disc_results', JSON.stringify(finalResults));
                    localStorage.setItem('disc_userInfo', JSON.stringify(userInfo));
                    window.scrollTo(0, 0);
                });
            };

            const handleSaveImage = () => {
                const element = document.getElementById('personal-result-capture');
                if (!element) return;

                setIsCapturing(true);

                // Capture screenshot using html2canvas. 
                // Since the table is already fully displayed on the page now, we capture it directly!
                html2canvas(element, {
                    scale: 2, // High resolution/quality
                    useCORS: true,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    const image = canvas.toDataURL('image/png');
                    setCapturedImage(image); // Open the preview modal. No automatic file download is triggered!
                    setIsCapturing(false);
                }).catch(err => {
                    console.error('Error generating image:', err);
                    alert('เกิดข้อผิดพลาดในการบันทึกรูปภาพ โปรดลองใหม่อีกครั้ง');
                    setIsCapturing(false);
                });
            };

            if (submitted) {
                return (
                    <div className="max-w-4xl mx-auto p-2 sm:p-6 mt-4 sm:mt-10 space-y-4 sm:space-y-8">
                        <div className="card rounded-2xl p-3 sm:p-8 shadow-xl overflow-hidden">

                            {/* Area to capture */}
                            <div id="personal-result-capture" className="bg-white p-2.5 sm:p-4 rounded-xl">
                                <h1 className="text-2xl sm:text-3xl font-semibold mb-4 sm:mb-6 text-center text-indigo-700">ผลการทดสอบ DISC ของคุณ</h1>

                                <div className="bg-indigo-50 p-4 rounded-xl mb-4 sm:mb-8 border border-indigo-100 shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                    <div className="text-[14px] sm:text-lg text-slate-700 space-y-1 w-full sm:w-auto">
                                        <p><span className="font-semibold text-slate-900">ชื่อ-นามสกุล:</span> {userInfo.fullName} {userInfo.nickname ? `(${userInfo.nickname})` : ''}</p>
                                        <p><span className="font-semibold text-slate-900">บทบาท/ตำแหน่งที่รับใช้:</span> {userInfo.role}</p>
                                        <p><span className="font-semibold text-slate-900">ส่วน:</span> {userInfo.section} | <span className="font-semibold text-slate-900">เพศ:</span> {userInfo.gender} | <span className="font-semibold text-slate-900">ช่วงอายุ:</span> {userInfo.ageRange}</p>
                                    </div>
                                    <div className="text-left sm:text-right w-full sm:w-auto flex sm:flex-col justify-between items-center sm:items-end border-t sm:border-t-0 pt-2 sm:pt-0 border-indigo-100">
                                        <div className="text-[11px] sm:text-xs font-semibold text-indigo-600 sm:mb-1 uppercase tracking-wide">บุคลิกภาพโดดเด่น</div>
                                        <div className="inline-block text-lg sm:text-2xl text-indigo-700 font-extrabold bg-white px-4 py-1.5 sm:px-6 sm:py-2.5 rounded-lg border border-indigo-200 shadow-sm">
                                            {results.dominantType}
                                        </div>
                                    </div>
                                </div>

                                {/* Table 1: ประวัติการตอบคำถาม */}
                                <div className="mb-6 sm:mb-8">
                                    <h2 className="text-base sm:text-lg font-bold mb-2.5 sm:mb-4 text-slate-800 flex items-center gap-1.5">
                                        <span className="w-1.5 h-4 bg-indigo-600 rounded-full"></span>
                                        1. ประวัติการตอบคำถามของคุณ
                                    </h2>
                                    <div id="history-table-container" className="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm overflow-x-hidden">
                                        <table className="w-full text-left text-xs sm:text-sm">
                                            <thead className="bg-indigo-50 sticky top-0 text-indigo-900 border-b border-indigo-100">
                                                <tr>
                                                    <th className="p-2 sm:p-3 border-b border-indigo-100 w-[12%] text-center font-bold">ข้อ</th>
                                                    <th className="p-2 sm:p-3 border-b border-indigo-100 w-[52%] font-bold">คำอธิบายที่เลือก</th>
                                                    <th className="p-2 sm:p-3 text-center border-b border-indigo-100 w-[18%] font-bold">ประเภท</th>
                                                    <th className="p-2 sm:p-3 text-center border-b border-indigo-100 w-[18%] font-bold">ผลลัพธ์</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.selectedItems.map((item, idx) => (
                                                    <tr key={idx} className="border-b border-slate-100 hover:bg-indigo-50/50 transition">
                                                        <td className="p-2 sm:p-3 text-center text-slate-600 font-medium">{item.group}</td>
                                                        <td className="p-2 sm:p-3 text-slate-700 leading-tight text-[12px] sm:text-sm">{item.text}</td>
                                                        <td className="p-2 sm:p-3 text-center">
                                                            <span
                                                                style={item.type === 'M' ? { backgroundColor: '#5D3FD3', color: '#ffffff' } : { backgroundColor: '#7DF9FF', color: '#000000' }}
                                                                className="px-2 py-0.5 rounded text-[10px] sm:text-xs font-bold leading-none shadow-sm"
                                                            >
                                                                {item.type}
                                                            </span>
                                                        </td>
                                                        <td className="p-2 sm:p-3 text-center font-bold text-indigo-600">{item.result}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* 2. สรุปคะแนนของกราฟที่ 1 (M) และกราฟที่ 2 (L) */}
                                <div className="bg-slate-50/40 p-4 sm:p-6 rounded-2xl border border-slate-200/60 mb-6 sm:mb-8 shadow-sm">
                                    <h2 className="text-base sm:text-lg font-bold mb-4 text-slate-800 flex items-center gap-1.5 border-b border-indigo-100 pb-2">
                                        <span className="w-1.5 h-4 bg-indigo-600 rounded-full"></span>
                                        2. สรุปคะแนนของกราฟที่ 1 (M) และกราฟที่ 2 (L)
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white p-4 rounded-xl border border-slate-200/60 shadow-sm">
                                            <h3 className="font-extrabold text-sm text-indigo-700 mb-3 flex items-center gap-2">
                                                <span className="flex items-center justify-center w-5 h-5 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold">M</span>
                                                คะแนน M (กราฟ 1) - คะแนนพฤติกรรมที่แสดงออกมากที่สุด
                                            </h3>
                                            <div className="grid grid-cols-5 gap-2 text-center">
                                                {['D', 'I', 'S', 'C', 'X'].map(trait => (
                                                    <div key={trait} className="bg-slate-50 p-2 rounded-lg border border-slate-100">
                                                        <div className="text-xs text-slate-500 font-bold">กลุ่ม {trait}</div>
                                                        <div className="text-base sm:text-lg font-black text-slate-800">{results.scoresM[trait]}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-xl border border-slate-200/60 shadow-sm">
                                            <h3 className="font-extrabold text-sm text-violet-700 mb-3 flex items-center gap-2">
                                                <span className="flex items-center justify-center w-5 h-5 rounded-full bg-violet-100 text-violet-700 text-xs font-bold">L</span>
                                                คะแนน L (กราฟ 2) - คะแนนพฤติกรรมที่แสดงออกน้อยที่สุด
                                            </h3>
                                            <div className="grid grid-cols-5 gap-2 text-center">
                                                {['D', 'I', 'S', 'C', 'X'].map(trait => (
                                                    <div key={trait} className="bg-slate-50 p-2 rounded-lg border border-slate-100">
                                                        <div className="text-xs text-slate-500 font-bold">กลุ่ม {trait}</div>
                                                        <div className="text-base sm:text-lg font-black text-slate-800">{results.scoresL[trait]}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 3. ผลคะแนนของกราฟ 3 (ผลคะแนนหลังจาก +- กราฟที่ 1 และ 2 ) */}
                                <div className="bg-indigo-50/30 p-4 sm:p-6 rounded-2xl mb-6 border border-indigo-100 shadow-sm">
                                    <h2 className="text-base sm:text-lg font-bold mb-4 text-slate-800 flex items-center justify-center gap-1.5 border-b border-indigo-100/50 pb-2">
                                        <span className="w-1.5 h-4 bg-indigo-600 rounded-full"></span>
                                        3. ผลคะแนนของกราฟ 3 (ผลคะแนนหลังจาก +- กราฟที่ 1 และ 2 )
                                    </h2>
                                    <div className="overflow-x-auto bg-white rounded-xl border border-slate-200 shadow-sm p-1 sm:p-3">
                                        <table className="w-full text-sm text-left text-slate-600 border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200 text-slate-700 font-bold">
                                                    <th className="p-3">กลุ่มบุคลิกภาพ</th>
                                                    <th className="p-3 text-center">คะแนน M (กราฟ 1)</th>
                                                    <th className="p-3 text-center">คะแนน L (กราฟ 2)</th>
                                                    <th className="p-3 text-center">ผลคะแนนของกราฟที่ 3</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {['D', 'I', 'S', 'C', 'X'].map(trait => {
                                                    const mScore = results.scoresM[trait];
                                                    const lScore = results.scoresL[trait];
                                                    const diff = results.diffScores[trait];
                                                    const isX = trait === 'X';

                                                    let badgeColor = isX ? "text-slate-500 bg-slate-100 border border-slate-200 font-medium" : "text-slate-600 bg-slate-100";
                                                    let displayDiff = isX ? "ไม่นำมาคำนวณ" : diff.toString();

                                                    if (!isX) {
                                                        if (diff > 0) {
                                                            badgeColor = "text-blue-800 bg-blue-50 border border-blue-200 font-black";
                                                            displayDiff = `+${diff}`;
                                                        } else if (diff < 0) {
                                                            badgeColor = "text-violet-800 bg-violet-50 border border-violet-200 font-black";
                                                        }
                                                    }
                                                    return (
                                                        <tr key={trait} className="border-b border-slate-100 hover:bg-slate-50/30 transition-colors">
                                                            <td className="p-3 font-bold text-slate-800 text-base">
                                                                {isX ? "กลุ่ม X (ไม่นำมาคำนวณ)" : `กลุ่ม ${trait}`}
                                                            </td>
                                                            <td className="p-3 text-center font-bold text-indigo-700 text-base">{mScore}</td>
                                                            <td className="p-3 text-center font-bold text-violet-600 text-base">{lScore}</td>
                                                            <td className="p-3 text-center">
                                                                <span className={`inline-block px-3 py-1 rounded-full ${isX ? 'text-xs' : 'text-base'} ${badgeColor}`}>
                                                                    {displayDiff}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            {/* Action Buttons */}
                            <div className="flex flex-col sm:flex-row gap-3 justify-center mb-6 border-t border-slate-100 pt-5 px-3">
                                <button
                                    onClick={handleSaveImage}
                                    disabled={isCapturing}
                                    className={`${isCapturing ? 'bg-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:scale-[1.01] active:scale-95'} text-white font-bold py-3 px-6 rounded-xl transition shadow-md hover:shadow-lg flex items-center justify-center gap-2 w-full sm:w-auto text-sm sm:text-base`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                    </svg>
                                    {isCapturing ? 'กำลังเตรียมรูปภาพ...' : 'บันทึกผลลัพธ์เป็นรูปภาพ'}
                                </button>
                            </div>

                            {/* Beautiful Glassmorphism Modal for Image Save on Mobile Devices */}
                            {capturedImage && (
                                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/85 backdrop-blur-sm p-3 sm:p-4 animate-fadeIn">
                                    <div className="bg-white rounded-2xl max-w-lg w-full p-4 sm:p-6 shadow-2xl flex flex-col max-h-[92vh] overflow-hidden border border-slate-100 animate-slideUp">
                                        <div className="flex justify-between items-center mb-3 border-b pb-2">
                                            <h3 className="text-base sm:text-lg font-bold text-slate-800 flex items-center gap-1.5">📲 บันทึกภาพลงคลังรูปภาพ</h3>
                                            <button
                                                onClick={() => setCapturedImage(null)}
                                                className="text-slate-400 hover:text-slate-600 text-2xl font-bold p-1 leading-none transition-colors"
                                            >
                                                &times;
                                            </button>
                                        </div>

                                        <div className="flex-1 overflow-y-auto mb-4 border border-slate-200 rounded-xl bg-slate-50 p-2 flex justify-center items-start">
                                            <img
                                                src={capturedImage}
                                                alt="DISC Result"
                                                className="max-w-full h-auto rounded-lg shadow-sm border border-slate-200"
                                            />
                                        </div>

                                        <div className="bg-emerald-50 border border-emerald-200 text-emerald-850 p-3.5 rounded-xl text-xs sm:text-sm mb-4 leading-relaxed font-medium text-center">
                                            📲 <strong>วิธีเซฟลงแอปอัลบั้มรูปภาพ:</strong> ให้คุณ<strong>กดค้างที่รูปภาพด้านบน</strong> แล้วเลือก <strong className="text-emerald-700 font-bold">"บันทึกรูปภาพ" (Save Image)</strong> หรือ <strong className="text-emerald-700 font-bold">"เพิ่มไปยังแอปรูปภาพ" (Add to Photos)</strong> เพื่อเก็บรูปเข้าสู่คลังภาพของโทรศัพท์คุณโดยตรง (ไม่ต้องผ่านโฟลเดอร์ดาวน์โหลดของระบบครับ!)
                                        </div>

                                        <div className="flex gap-2 justify-end border-t pt-3">
                                            <button
                                                onClick={() => setCapturedImage(null)}
                                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition text-center text-xs sm:text-sm shadow-md hover:shadow-lg"
                                            >
                                                เสร็จสิ้น / ปิดหน้าต่าง
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <StatsCharts />

                            <button
                                onClick={() => {
                                    if (window.confirm('คุณต้องการกลับไปทำแบบทดสอบใหม่อีกครั้งใช่หรือไม่? (ข้อมูลผลลัพธ์รอบปัจจุบันของคุณได้รับการบันทึกเรียบร้อยแล้ว)')) {
                                        localStorage.removeItem('disc_submitted');
                                        localStorage.removeItem('disc_results');
                                        setSubmitted(false);
                                        setResults(null);
                                        setAnswers({});
                                        window.scrollTo(0, 0);
                                    }
                                }}
                                className="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl transition transform hover:scale-[1.01] active:scale-95 shadow-md hover:shadow-lg text-sm sm:text-base"
                            >
                                ทำแบบทดสอบอีกครั้ง
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl sm:text-4xl font-semibold mb-4 text-indigo-700">แบบทดสอบ DISC</h1>
                        <p className="text-slate-600 max-w-2xl mx-auto">
                            ในแต่ละกลุ่ม 4 ข้อ ให้เลือก <strong className="text-indigo-600">M (มากที่สุด)</strong> 1 ข้อ และ <strong className="text-indigo-600">L (น้อยที่สุด)</strong> 1 ข้อ ที่อธิบายความเป็นตัวคุณ
                        </p>
                    </header>

                    {formError && (
                        <div className="mb-8 p-4 bg-rose-100 border border-rose-400 text-rose-700 rounded-lg shadow-sm text-center font-medium">
                            {formError}
                        </div>
                    )}

                    <div className="card rounded-2xl p-6 shadow-md border-slate-200 mb-8">
                        <h2 className="text-xl font-medium mb-4 text-slate-800 border-b border-indigo-100 pb-2">ข้อมูลผู้ทำแบบทดสอบ</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium text-slate-700 mb-2">บทบาท/ตำแหน่งที่รับใช้ *</label>
                                <select className="w-full p-2 border border-slate-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-white"
                                    value={userInfo.role} onChange={e => setUserInfo({ ...userInfo, role: e.target.value })}>
                                    <option value="">-- เลือกบทบาท/ตำแหน่งที่รับใช้ --</option>
                                    <option value="ศิษยาภิบาล">1. ศิษยาภิบาล</option>
                                    <option value="ผู้ปกครอง">2. ผู้ปกครอง</option>
                                    <option value="อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา">3. อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา</option>
                                    <option value="หัวหน้าเขตและผู้ช่วย">4. หัวหน้าเขตและผู้ช่วย</option>
                                    <option value="หัวหน้าหน่วยและผู้ช่วย">5. หัวหน้าหน่วยและผู้ช่วย</option>
                                    <option value="หัวหน้าเซลล์และผู้ช่วย">6. หัวหน้าเซลล์และผู้ช่วย</option>
                                    <option value="พี่เลี้ยง">7. พี่เลี้ยง</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-2">1. ชื่อ-นามสกุล *</label>
                                <input type="text" className="w-full p-2 border border-slate-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-white"
                                    value={userInfo.fullName} onChange={e => setUserInfo({ ...userInfo, fullName: e.target.value })} placeholder="กรอกชื่อ-นามสกุล" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-2">2. ชื่อเล่น *</label>
                                <input type="text" className="w-full p-2 border border-slate-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-white"
                                    value={userInfo.nickname} onChange={e => setUserInfo({ ...userInfo, nickname: e.target.value })} placeholder="กรอกชื่อเล่น" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-2">3. ส่วน *</label>
                                <select className="w-full p-2 border border-slate-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-white"
                                    value={userInfo.section} onChange={e => setUserInfo({ ...userInfo, section: e.target.value })}>
                                    <option value="">-- เลือกส่วน --</option>
                                    <option value="J1">J1</option>
                                    <option value="J2">J2</option>
                                    <option value="J3">J3</option>
                                    <option value="NGM">NGM</option>
                                    <option value="OASIS">OASIS</option>
                                    <option value="รามคำแหง">รามคำแหง</option>
                                    <option value="อื่นๆ">อื่นๆ</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-2">4. เพศ *</label>
                                <select className="w-full p-2 border border-slate-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-white"
                                    value={userInfo.gender} onChange={e => setUserInfo({ ...userInfo, gender: e.target.value })}>
                                    <option value="">-- เลือกเพศ --</option>
                                    <option value="ชาย">ชาย</option>
                                    <option value="หญิง">หญิง</option>
                                </select>
                            </div>

                            <div className="md:col-span-2">
                                <label className="block text-sm font-medium text-slate-700 mb-3">5. ช่วงอายุ *</label>
                                <div className="flex flex-wrap gap-4">
                                    {['13-19', '20-29', '30-39', '40-49', '50-59', '60 ขึ้นไป'].map(age => (
                                        <label key={age} className="flex items-center space-x-2 cursor-pointer bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 hover:bg-indigo-50">
                                            <input type="radio" name="ageRange" value={age} className="text-indigo-600 focus:ring-indigo-500 h-4 w-4"
                                                checked={userInfo.ageRange === age}
                                                onChange={e => setUserInfo({ ...userInfo, ageRange: e.target.value })} />
                                            <span className="text-slate-700">{age}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-8">
                        {groups.map((groupItems, index) => {
                            const groupId = groupItems[0].group;
                            const groupAns = answers[groupId] || { m: null, l: null };

                            return (
                                <div key={groupId} className="card rounded-2xl p-6 shadow-md border-slate-200">
                                    <h2 className="text-xl font-medium mb-4 text-slate-800 border-b border-indigo-100 pb-2">กลุ่มคำถามที่ {groupId}</h2>
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-[1fr_50px_50px] gap-4 mb-2 text-sm font-semibold text-slate-500 text-center">
                                            <div className="text-left">คำอธิบายบุคลิกภาพ</div>
                                            <div>M</div>
                                            <div>L</div>
                                        </div>

                                        {groupItems.map(item => (
                                            <div key={item.id} className="grid grid-cols-[1fr_50px_50px] gap-4 items-center p-2 hover:bg-indigo-50/70 rounded-lg transition">
                                                <div className="text-lg text-slate-700">{item.text}</div>
                                                <div className="flex justify-center">
                                                    <input
                                                        type="radio"
                                                        name={`group_${groupId}_m`}
                                                        className="radio-btn"
                                                        checked={groupAns.m === item.id}
                                                        onChange={() => handleSelect(groupId, item.id, 'm')}
                                                    />
                                                </div>
                                                <div className="flex justify-center">
                                                    <input
                                                        type="radio"
                                                        name={`group_${groupId}_l`}
                                                        className="radio-btn"
                                                        checked={groupAns.l === item.id}
                                                        onChange={() => handleSelect(groupId, item.id, 'l')}
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-10 mb-20 text-center">
                        <button
                            onClick={calculateResults}
                            disabled={isSubmitting}
                            className={`font-bold py-4 px-10 rounded-full shadow-lg transition transform text-xl ${isSubmitting ? 'bg-indigo-400 text-white cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-500/30 hover:scale-105'}`}
                        >
                            {isSubmitting ? 'กำลังประมวลผลและบันทึกข้อมูล...' : 'ส่งคำตอบและดูผลลัพธ์'}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
