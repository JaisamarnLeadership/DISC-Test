    <script>
        window.addEventListener('error', function(e) {
            var display = document.getElementById('error-display');
            var msg = document.getElementById('error-message');
            if (display && msg) {
                display.style.display = 'block';
                msg.textContent += '\n' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno;
            }
        });
        window.addEventListener('unhandledrejection', function(e) {
            var display = document.getElementById('error-display');
            var msg = document.getElementById('error-message');
            if (display && msg) {
                display.style.display = 'block';
                msg.textContent += '\nUnhandled Promise Rejection: ' + e.reason;
            }
        });
    </script>

        function doPost(e) {
          try {
            var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
            var data = JSON.parse(e.postData.contents);
            if (sheet.getLastRow() === 0) { setupSheet(sheet); }
            var scores = data.scores || {};
            var row = [
              data.date || new Date().toISOString(),
              data.fullName || "",
              data.nickname || "",
              data.role || "",
              data.section || "",
              data.gender || "",
              data.ageRange || "",
              data.dominantType || "",
              scores["ก"] || 0, scores["ข"] || 0, scores["ค"] || 0, scores["ง"] || 0,
              scores["จ"] || 0, scores["ฉ"] || 0, scores["ช"] || 0, scores["ซ"] || 0,
              scores["ฌ"] || 0, scores["ญ"] || 0, scores["ฎ"] || 0, scores["ฏ"] || 0,
              scores["ฐ"] || 0, scores["ฑ"] || 0, scores["ฒ"] || 0, scores["ณ"] || 0,
              scores["ด"] || 0, scores["ต"] || 0, scores["ถ"] || 0
            ];
            sheet.appendRow(row);
            return ContentService.createTextOutput(JSON.stringify({ status: "success" }))
              .setMimeType(ContentService.MimeType.JSON);
          } catch(err) {
            return ContentService.createTextOutput(JSON.stringify({ status: "error", message: err.toString() }))
              .setMimeType(ContentService.MimeType.JSON);
          }
        }

        function doGet(e) {
          try {
            var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
            var rows = sheet.getDataRange().getValues();
            if (rows.length <= 1) {
              return ContentService.createTextOutput(JSON.stringify([])).setMimeType(ContentService.MimeType.JSON);
            }
            var jsonArray = [];
            var categories = ["ก","ข","ค","ง","จ","ฉ","ช","ซ","ฌ","ญ","ฎ","ฏ","ฐ","ฑ","ฒ","ณ","ด","ต","ถ"];
            for (var i = 1; i < rows.length; i++) {
              var r = rows[i];
              if (!r[1]) continue;
              var scoresObj = {};
              for (var j = 0; j < categories.length; j++) {
                scoresObj[categories[j]] = Number(r[8 + j]) || 0;
              }
              jsonArray.push({
                date: r[0], fullName: r[1], nickname: r[2], role: r[3], section: r[4], gender: r[5], ageRange: r[6], dominantType: r[7],
                scores: scoresObj
              });
            }
            return ContentService.createTextOutput(JSON.stringify(jsonArray)).setMimeType(ContentService.MimeType.JSON);
          } catch(err) {
            return ContentService.createTextOutput(JSON.stringify({ status: "error", message: err.toString() })).setMimeType(ContentService.MimeType.JSON);
          }

        function setupSheet(targetSheet) {

          ];

            const mockList = [];
            const seedNames = [
                "มานะ", "วิชัย", "กิตติพงษ์", "สุรศักดิ์", "ประเสริฐ", "สมจิต", "ปรีชา", "ณรงค์", "อภิชาติ", "อนันต์",
                "วิภาดา", "สมศรี", "จอมขวัญ", "นารีรัตน์", "สิริพร", "ดาริกา", "สุจิตรา", "พัชรี", "นวลจันทร์", "ดารณี",
                "สิทธิชัย", "ไพโรจน์", "เกรียงศักดิ์", "วิรัช", "พงษ์ศักดิ์", "รังสรรค์", "อุดม", "ธวัชชัย", "เฉลิม", "นิรันดร์",
                "จารุณี", "เรณู", "วาสนา", "วรรณิกา", "ปิยวรรณ", "อรวรรณ", "กมลวรรณ", "ปรียาพร", "รัชนีกร", "นันทนา",
                "สมชาย", "พิมพ์ใจ"
            ];

            for (let i = 0; i < 42; i++) {
                const name = seedNames[i];
                const role = rolesList[i % rolesList.length];
                const section = sectionsList[i % sectionsList.length];
                const gender = gendersList[i % gendersList.length];
                const ageRange = ageRangesList[i % ageRangesList.length];

                // สร้างคะแนนสุ่มของของประทาน 19 ตัว (คะแนน 2 ถึง 21) โดยสร้าง Bias บางช่องเพื่อให้กราฟสวยงาม
                const scores = {};
                let maxVal = -1;
                let domList = [];

                giftIds.forEach((gid, gidx) => {
                    // กำหนด bias ตามดัชนีของตัวจำลองเพื่อให้การกระจายของประทานต่างกันแบบมีทิศทาง
                    const bias = (gidx + (i % 4) * 3) % 5;
                    const base = 4 + bias * 3.5; 
                    const randOffset = Math.floor(Math.random() * 5); 
                    const score = Math.min(21, Math.round(base + randOffset));
                    scores[gid] = score;

                    if (score > maxVal) {
                        maxVal = score;
                        domList = [gid];
                    } else if (score === maxVal) {
                        domList.push(gid);
                    }
                });

                const domText = domList.map(g => {
                    const cObj = CATEGORIES.find(item => item.id === g);
                    return cObj ? `${cObj.id} (${cObj.name})` : g;
                }).join(', ');

                mockList.push({
                    fullName: name + " รักดี",
                    nickname: name.slice(0, 3),
                    role: role,
                    section: section,
                    gender: gender,
                    ageRange: ageRange,
                    scores: scores,
                    dominantType: domText,
                    date: new Date(Date.now() - i * 86400000).toISOString()
                });
            }
            return mockList;
        };

        const MOCK_HISTORY_DATA = generateMockData();

        // ===================== STATS CHART COMPONENT =====================
        function StatsCharts({ refreshTrigger, userInfo, userScores }) {
            const chartInstances = useRef({});
            const [isLoading, setIsLoading] = useState(true);
            const [statsError, setStatsError] = useState(null);
            const [history, setHistory] = useState([]);
            const [statsData, setStatsData] = useState(null);

            const secIdMap = useMemo(() => ({
                'J1': 'j1',
                'J2': 'j2',
                'J3': 'j3',
                'NGM': 'ngm',
                'OASIS': 'oasis',
                'รามคำแหง': 'ram',
                'อื่นๆ': 'others'
            }), []);

            // โหลดข้อมูลประวัติทั้งหมด
            const loadStats = useCallback(() => {
                setIsLoading(true);
                setStatsError(null);

                // ค้นหาประวัติที่เซฟไว้ในเครื่อง
                let localHistory = [];
                try {
                    const localHistoryStr = localStorage.getItem('sgt_history');
                    if (localHistoryStr) {
                        localHistory = JSON.parse(localHistoryStr);
                    }
                } catch(e) {
                    console.error('Error loading local history:', e);
                }

                if (!SCRIPT_URL) {
                    // หากไม่มี SCRIPT_URL ให้ดึงข้อมูล Mock + ข้อมูลเครื่องตัวเองทันที
                    setTimeout(() => {
                        const combined = [...localHistory, ...MOCK_HISTORY_DATA];
                        setHistory(combined);
                        setIsLoading(false);
                    }, 500);
                    return;
                }

                // ดึงข้อมูลจริงจาก Google Sheets (เพิ่ม Cache-buster เพื่อเลี่ยงการจำค่าเก่าของเบราว์เซอร์)
                fetch(SCRIPT_URL + '?read=true&_cb=' + new Date().getTime())
                    .then(res => {
                        if (!res.ok) throw new Error('การส่งคำขอล้มเหลว');
                        return res.json();
                    })
                    .then(remoteData => {
                        // รวมข้อมูลที่ดึงมากับข้อมูลที่อาจเพิ่งกดบันทึกในเครื่อง
                        const combined = [...localHistory, ...remoteData];
                        
                        // กรองรายการซ้ำ (เปรียบเทียบจากชื่อและเวลา เพื่อป้องกันข้อมูลซ้ำ)
                        const uniqueMap = new Map();
                        combined.forEach(item => {
                            const key = `${item.fullName || item.FullName}_${item.date || item.Date}`;
                            uniqueMap.set(key, item);
                        });
                        
                        setHistory(Array.from(uniqueMap.values()));
                        setIsLoading(false);
                    })
                    .catch(err => {
                        console.error('Stats loading error:', err);
                        // หากมี SCRIPT_URL แต่ดึงข้อมูลล้มเหลว จะไม่ดึงข้อมูล Mock มาปนเพื่อป้องกันความสับสน
                        setStatsError('ไม่สามารถเชื่อมต่อฐานข้อมูล Google Sheets ได้ (กำลังแสดงเฉพาะข้อมูลที่เคยทำไว้บนเครื่องนี้)');
                        setHistory(localHistory);
                        setIsLoading(false);
                    });
            }, []);

            const handleClearLocalCache = () => {
                if (window.confirm("คุณต้องการล้างข้อมูลผู้ทำแบบประเมินที่ถูกบันทึกชั่วคราวบนเครื่องนี้ใช่หรือไม่? (จะไม่ส่งผลกระทบต่อข้อมูลจริงใน Google Sheets)")) {
                    localStorage.removeItem('sgt_history');
                    loadStats();
                }
            };

            useEffect(() => {
                loadStats();
            }, [refreshTrigger, loadStats]);

            // คำนวณสรุปสถิติเมื่อข้อมูลประวัติเปลี่ยน
            useEffect(() => {
                // โครงสร้างสะสมผลสถิติสำหรับของประทาน 19 ตัว
                const giftCounts = {};
                CATEGORIES.forEach(c => { giftCounts[c.id] = 0; });

                const sections = ["J1", "J2", "J3", "NGM", "OASIS", "รามคำแหง", "อื่นๆ"];
                const sectionByGift = {};
                sections.forEach(sec => {
                    sectionByGift[sec] = {};
                    CATEGORIES.forEach(c => { sectionByGift[sec][c.id] = 0; });
                });

                const roles = ["ศิษยาภิบาล", "ผู้ปกครอง/มัคนายก", "อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา", "หัวหน้าเขตและผู้ช่วย", "หัวหน่วยและผู้ช่วย", "หัวหน้าเซลล์และผู้ช่วย", "พี่เลี้ยง", "สมาชิกทั่วไป"];
                const roleByGift = {};
                roles.forEach(role => {
                    roleByGift[role] = {};
                    CATEGORIES.forEach(c => { roleByGift[role][c.id] = 0; });
                });

                const ageRanges = ["13-19", "20-29", "30-39", "40-49", "50-59", "60ขึ้นไป"];
                const ageByGift = {};
                ageRanges.forEach(age => {
                    ageByGift[age] = {};
                    CATEGORIES.forEach(c => { ageByGift[age][c.id] = 0; });
                });

                const genderByGift = {
                    'ชาย': {},
                    'หญิง': {}
                };
                CATEGORIES.forEach(c => {
                    genderByGift['ชาย'][c.id] = 0;
                    genderByGift['หญิง'][c.id] = 0;
                });

                let totalRespondents = 0;

                history.forEach(item => {
                    const scores = item.scores || item.Scores;
                    if (!scores) return;

                    // ค้นหาของประทานที่ได้คะแนนสูงสุดของแต่ละคน (หากเสมอกันจะเอาหมด)
                    let maxVal = -1;
                    let domList = [];
                    CATEGORIES.forEach(c => {
                        const val = Number(scores[c.id]) || 0;
                        if (val > maxVal) {
                            maxVal = val;
                            domList = [c.id];
                        } else if (val === maxVal && val > 0) {
                            domList.push(c.id);
                        }
                    });

                    if (maxVal > 0) {
                        totalRespondents++;
                        
                        // เลือกของประทานสูงสุดเพียงตัวเดียว (หากเสมอกันให้สุ่มตัวเดียวแบบ deterministic อิงจากชื่อและเวลา เพื่อให้ค่าสถิตินิ่งไม่ดิ้นตอนรีโหลดหน้าจอ)
                        let selectedGid = domList[0];
                        if (domList.length > 1) {
                            const seedStr = (item.date || '') + (item.fullName || '') + (item.nickname || '');
                            let hash = 0;
                            for (let i = 0; i < seedStr.length; i++) {
                                hash = seedStr.charCodeAt(i) + ((hash << 5) - hash);
                            }
                            const idx = Math.abs(hash) % domList.length;
                            selectedGid = domList[idx];
                        }

                        giftCounts[selectedGid]++;

                        // แผนก/ส่วน
                        let itemSec = item.section || item.Section;
                        if (itemSec) {
                            itemSec = itemSec.trim();
                            if (sectionByGift[itemSec]) {
                                sectionByGift[itemSec][selectedGid]++;
                            } else {
                                sectionByGift["อื่นๆ"][selectedGid]++;
                            }
                        } else {
                            sectionByGift["อื่นๆ"][selectedGid]++;
                        }

                        // บทบาท
                        let itemRole = item.role || item.Role;
                        if (itemRole) {
                            itemRole = itemRole.trim();
                            if (roleByGift[itemRole]) {
                                roleByGift[itemRole][selectedGid]++;
                            } else {
                                roleByGift["สมาชิกทั่วไป"][selectedGid]++;
                            }
                        } else {
                            roleByGift["สมาชิกทั่วไป"][selectedGid]++;
                        }

                        // กลุ่มอายุ
                        let itemAge = item.ageRange || item.AgeRange || item.age || item.Age;
                        if (itemAge) {
                            itemAge = itemAge.trim();
                            if (ageByGift[itemAge]) ageByGift[itemAge][selectedGid]++;
                        }

                        // เพศ
                        let itemGen = item.gender || item.Gender;
                        if (itemGen) {
                            itemGen = itemGen.trim();
                            if (genderByGift[itemGen]) genderByGift[itemGen][selectedGid]++;
                        }
                    }
                });

                setStatsData({
                    giftCounts,
                    sectionByGift,
                    roleByGift,
                    ageByGift,
                    genderByGift,
                    totalRespondents
                });
            }, [history]);

            // วาดกราฟสรุปทั้งหมด
            useEffect(() => {
                if (!statsData) return;

                // ทำลายกราฟเก่าทั้งหมดถ้ามี
                Object.values(chartInstances.current).forEach(chart => {
                    if (chart && typeof chart.destroy === 'function') chart.destroy();
                });

                const labels = CATEGORIES.map(c => c.id); // 'ก', 'ข', 'ค' ...
                const fullNames = CATEGORIES.map(c => `${c.id} ${c.name}`);

                const commonOptions = {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                title: (tooltipItems) => {
                                    const index = tooltipItems[0].dataIndex;
                                    return fullNames[index];
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                };

                const stackedOptions = {
                    ...commonOptions,
                    plugins: {
                        ...commonOptions.plugins,
                        legend: { display: true, position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false } },
                        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                };

                // 1. กราฟสรุปจำนวนผู้มีของประทานเด่นแต่ละอย่าง
                const ctxTotal = document.getElementById('chart-total-gifts');
                if (ctxTotal) {
                    chartInstances.current.total = new Chart(ctxTotal, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'จำนวนคน (ที่มีของประทานนี้เด่นที่สุด)',
                                data: CATEGORIES.map(c => statsData.giftCounts[c.id]),
                                backgroundColor: '#7c3aed',
                                borderRadius: 6
                            }]
                        },
                        options: {
                            ...commonOptions,
                            plugins: {
                                ...commonOptions.plugins,
                                legend: { display: false }
                            }
                        }
                    });
                }

                // 2. กราฟสรุปแยกตามส่วน
                const ctxSection = document.getElementById('chart-section-gifts');
                if (ctxSection) {
                    const sections = ["J1", "J2", "J3", "NGM", "OASIS", "รามคำแหง", "อื่นๆ"];
                    const sectionColors = {
                        'J1': '#06b6d4',
                        'J2': '#2563eb',
                        'J3': '#8b5cf6',
                        'NGM': '#ec4899',
                        'OASIS': '#10b981',
                        'รามคำแหง': '#f59e0b',
                        'อื่นๆ': '#64748b'
                    };
                    const datasets = sections.map(sec => ({
                        label: sec,
                        data: CATEGORIES.map(c => statsData.sectionByGift[sec][c.id]),
                        backgroundColor: sectionColors[sec]
                    }));

                    chartInstances.current.section = new Chart(ctxSection, {
                        type: 'bar',
                        data: { labels, datasets },
                        options: stackedOptions
                    });
                }

                // 3. กราฟสรุปแยกตามบทบาท
                const ctxRole = document.getElementById('chart-role-gifts');
                if (ctxRole) {
                    const roles = ["ศิษยาภิบาล", "ผู้ปกครอง/มัคนายก", "อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา", "หัวหน้าเขตและผู้ช่วย", "หัวหน่วยและผู้ช่วย", "หัวหน้าเซลล์และผู้ช่วย", "พี่เลี้ยง", "สมาชิกทั่วไป"];
                    const roleColors = {
                        'ศิษยาภิบาล': '#1e3a8a',
                        'ผู้ปกครอง/มัคนายก': '#0284c7',
                        'อาจารย์/ผู้รับใช้เต็มเวลา/สต๊าฟเต็มเวลา': '#0d9488',
                        'หัวหน้าเขตและผู้ช่วย': '#059669',
                        'หัวหน่วยและผู้ช่วย': '#16a34a',
                        'หัวหน้าเซลล์และผู้ช่วย': '#7c3aed',
                        'พี่เลี้ยง': '#db2777',
                        'สมาชิกทั่วไป': '#64748b'
                    };
                    const datasets = roles.map(role => ({
                        label: role,
                        data: CATEGORIES.map(c => statsData.roleByGift[role][c.id]),
                        backgroundColor: roleColors[role] || '#cbd5e1'
                    }));

                    chartInstances.current.role = new Chart(ctxRole, {
                        type: 'bar',
                        data: { labels, datasets },
                        options: stackedOptions
                    });
                }

                // 4. กราฟสรุปแยกตามกลุ่มอายุ
                const ctxAge = document.getElementById('chart-age-gifts');
                if (ctxAge) {
                    const ageRanges = ["13-19", "20-29", "30-39", "40-49", "50-59", "60ขึ้นไป"];
                    const ageColors = {
                        '13-19': '#f87171',
                        '20-29': '#fb923c',
                        '30-39': '#fbbf24',
                        '40-49': '#34d399',
                        '50-59': '#60a5fa',
                        '60ขึ้นไป': '#a78bfa'
                    };
                    const datasets = ageRanges.map(age => ({
                        label: age,
                        data: CATEGORIES.map(c => statsData.ageByGift[age][c.id]),
                        backgroundColor: ageColors[age]
                    }));

                    chartInstances.current.age = new Chart(ctxAge, {
                        type: 'bar',
                        data: { labels, datasets },
                        options: stackedOptions
                    });
                }

                // 5. กราฟสรุปแยกตามเพศ
                const ctxGender = document.getElementById('chart-gender-gifts');
                if (ctxGender) {
                    const genders = ["ชาย", "หญิง"];
                    const genderColors = {
                        'ชาย': '#3b82f6',
                        'หญิง': '#ec4899'
                    };
                    const datasets = genders.map(gen => ({
                        label: gen,
                        data: CATEGORIES.map(c => statsData.genderByGift[gen][c.id]),
                        backgroundColor: genderColors[gen]
                    }));

                    chartInstances.current.gender = new Chart(ctxGender, {
                        type: 'bar',
                        data: { labels, datasets },
                        options: stackedOptions
                    });
                }

                // 6. กราฟวงกลมสัดส่วนของประทานแยกตามแผนก/ส่วน (J1, J2, J3, NGM, OASIS, รามคำแหง, อื่นๆ)
                const sectionsList = ["J1", "J2", "J3", "NGM", "OASIS", "รามคำแหง", "อื่นๆ"];
                sectionsList.forEach(sec => {
                    const canvasId = `chart-pie-section-${secIdMap[sec]}`;
                    const ctxSecPie = document.getElementById(canvasId);
                    if (ctxSecPie) {
                        const rawData = statsData.sectionByGift[sec] || {};
                        const activeGifts = CATEGORIES.filter(c => (rawData[c.id] || 0) > 0);
                        
                        if (activeGifts.length === 0) {
                            chartInstances.current[`pie_${secIdMap[sec]}`] = new Chart(ctxSecPie, {
                                type: 'doughnut',
                                data: {
                                    labels: ['ไม่มีข้อมูล'],
                                    datasets: [{
                                        data: [1],
                                        backgroundColor: ['#f1f5f9'],
                                        borderWidth: 0
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: { display: false },
                                        tooltip: {
                                            callbacks: {
                                                label: () => ' ยังไม่มีผู้ทำแบบประเมินในส่วนนี้'
                                            }
                                        }
                                    }
                                }
                            });
                        } else {
                            chartInstances.current[`pie_${secIdMap[sec]}`] = new Chart(ctxSecPie, {
                                type: 'doughnut',
                                data: {
                                    labels: activeGifts.map(c => `${c.id} - ${c.name}`),
                                    datasets: [{
                                        data: activeGifts.map(c => rawData[c.id]),
                                        backgroundColor: activeGifts.map(c => {
                                            const idx = CATEGORIES.findIndex(cat => cat.id === c.id);
                                            const hue = (idx * 360 / 19) % 360;
                                            return `hsla(${hue}, 70%, 55%, 0.85)`;
                                        }),
                                        borderColor: activeGifts.map(c => {
                                            const idx = CATEGORIES.findIndex(cat => cat.id === c.id);
                                            const hue = (idx * 360 / 19) % 360;
                                            return `hsl(${hue}, 70%, 45%)`;
                                        }),
                                        borderWidth: 1.5
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: { display: false },
                                        tooltip: {
                                            callbacks: {
                                                label: (context) => {
                                                    const val = context.raw;
                                                    const label = context.label;
                                                    return ` ${label}: ${val} คน`;
                                                }
                                            }
                                        }
                                    }
                                }
                            });
                        }
                    }
                });

                return () => {
                    Object.values(chartInstances.current).forEach(chart => {
                        if (chart && typeof chart.destroy === 'function') chart.destroy();
                    });
                };
            }, [statsData]);

            return (
                <div className="mt-8 border-t border-purple-200 pt-6">
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-3">
                        <div>
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <span className="w-2.5 h-6 bg-indigo-600 rounded-full inline-block"></span>
                                สถิติรวมของผู้ทำแบบประเมิน
                            </h2>
                            <p className="text-xs text-slate-500 mt-1">ประมวลผลของประทานเด่นจากฐานข้อมูลผู้ร่วมทำประเมินทั้งหมด ({history.length} คน)</p>
                        </div>
                        <div className="flex gap-2 flex-wrap">
                            <button
                                onClick={handleClearLocalCache}
                                className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-xl border border-rose-200 bg-rose-50 hover:bg-rose-100 text-rose-700 shadow-sm active:scale-95 transition-all"
                            >
                                🗑️ ล้างแคชเครื่องตัวเอง
                            </button>
                            <button
                                onClick={loadStats}
                                disabled={isLoading}
                                className={`flex items-center gap-1.5 px-4 py-2 text-sm font-semibold rounded-xl border transition-all ${
                                    isLoading
                                    ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed'
                                    : 'bg-white hover:bg-slate-50 text-indigo-600 border-indigo-200 shadow-sm active:scale-95'
                                }`}
                            >
                                <svg className={`w-4 h-4 ${isLoading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3m0 0l3 3m-3-3v8"></path>
                                </svg>
                                {isLoading ? 'กำลังโหลด...' : 'รีเฟรชข้อมูลสถิติ'}
                            </button>
                        </div>
                    </div>

                    {statsError && (
                        <div className="p-3 bg-amber-50 text-amber-800 text-xs rounded-xl border border-amber-200 mb-6 leading-relaxed">
                            ⚠️ <strong>หมายเหตุ:</strong> {statsError}
                        </div>
                    )}

                    {isLoading ? (
                        <div className="text-center py-10">
                            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mx-auto"></div>
                            <p className="mt-2 text-slate-500 text-sm">กำลังคำนวณข้อมูลสถิติ...</p>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {/* Summary Cards */}
                            <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3">
                                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-center shadow-sm">
                                    <div className="text-2xl font-bold text-indigo-700">{history.length}</div>
                                    <div className="text-xs font-semibold text-indigo-900">ผู้ประเมินทั้งหมด</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                                    <div className="text-2xl font-bold text-emerald-600">
                                        {history.filter(i => (i.section || i.Section) === 'J1').length}
                                    </div>
                                    <div className="text-xs text-slate-500">ส่วน J1</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                                    <div className="text-2xl font-bold text-blue-600">
                                        {history.filter(i => (i.section || i.Section) === 'J2').length}
                                    </div>
                                    <div className="text-xs text-slate-500">ส่วน J2</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                                    <div className="text-2xl font-bold text-purple-600">
                                        {history.filter(i => (i.section || i.Section) === 'J3').length}
                                    </div>
                                    <div className="text-xs text-slate-500">ส่วน J3</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                                    <div className="text-2xl font-bold text-orange-600">
                                        {history.filter(i => (i.section || i.Section) === 'NGM').length}
                                    </div>
                                    <div className="text-xs text-slate-500">ส่วน NGM</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                                    <div className="text-2xl font-bold text-pink-600">
                                        {history.filter(i => (i.section || i.Section) === 'OASIS').length}
                                    </div>
                                    <div className="text-xs text-slate-500">ส่วน OASIS</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                                    <div className="text-2xl font-bold text-teal-600">
                                        {history.filter(i => (i.section || i.Section) === 'รามคำแหง').length}
                                    </div>
                                    <div className="text-xs text-slate-500">รามคำแหง</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                                    <div className="text-2xl font-bold text-slate-600">
                                        {history.filter(i => {
                                            const sec = i.section || i.Section;
                                            return !['J1', 'J2', 'J3', 'NGM', 'OASIS', 'รามคำแหง'].includes(sec);
                                        }).length}
                                    </div>
                                    <div className="text-xs text-slate-500">อื่นๆ</div>
                                </div>
                            </div>

                            {/* Charts Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {/* Chart 1 */}
                                <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col">
                                    <h3 className="text-sm font-semibold text-slate-700 mb-3 text-center">7.1. จำนวนของคนที่มีของประทานเด่นแต่ละอย่าง</h3>
                                    <div className="h-60 relative w-full">
                                        <canvas id="chart-total-gifts"></canvas>
                                    </div>
                                </div>

                                {/* Chart 2 */}
                                <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col">
                                    <h3 className="text-sm font-semibold text-slate-700 mb-3 text-center">7.2. ของประทานเด่นแบ่งตาม "ส่วน/แผนก"</h3>
                                    <div className="h-60 relative w-full">
                                        <canvas id="chart-section-gifts"></canvas>
                                    </div>
                                </div>

                                {/* Chart 3 */}
                                <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col md:col-span-2">
                                    <h3 className="text-sm font-semibold text-slate-700 mb-3 text-center">7.3. ของประทานเด่นแบ่งตาม "บทบาท/ตำแหน่งหน้าที่รับใช้"</h3>
                                    <div className="h-64 relative w-full">
                                        <canvas id="chart-role-gifts"></canvas>
                                    </div>
                                </div>

                                {/* Chart 4 */}
                                <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col">
                                    <h3 className="text-sm font-semibold text-slate-700 mb-3 text-center">7.4. ของประทานเด่นแบ่งตาม "กลุ่มอายุ"</h3>
                                    <div className="h-60 relative w-full">
                                        <canvas id="chart-age-gifts"></canvas>
                                    </div>
                                </div>

                                {/* Chart 5 (Pie Charts for each section) */}
                                <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col md:col-span-2">
                                    <h3 className="text-sm font-bold text-indigo-950 mb-4 text-center">7.5. สัดส่วนของประทานเด่นจำแนกตามส่วน/แผนก (กราฟวงกลม)</h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                                        {["J1", "J2", "J3", "NGM", "OASIS", "รามคำแหง", "อื่นๆ"].map(sec => (
                                            <div key={sec} className="bg-slate-50/50 p-3 rounded-xl border border-slate-150 flex flex-col items-center shadow-inner">
                                                <span className="text-xs font-bold text-slate-700 mb-2">ส่วน {sec}</span>
                                                <div className="h-32 w-32 relative">
                                                    <canvas id={`chart-pie-section-${secIdMap[sec]}`}></canvas>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Chart 6 */}
                                <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col md:col-span-2">
                                    <h3 className="text-sm font-semibold text-slate-700 mb-3 text-center">7.6. ของประทานเด่นจำแนกรายเพศ (ชาย/หญิง)</h3>
                                    <div className="h-60 relative w-full">
                                        <canvas id="chart-gender-gifts"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ===================== MAIN APP COMPONENT =====================
        function App() {
            // answers: { questionIndex: score }
            const [answers, setAnswers] = useState(() => {
                const saved = localStorage.getItem('sgt_state');
                if (saved) {
                    try { return JSON.parse(saved).answers || {}; } catch(e) {}
                }
                return {};
            });
            const [userInfo, setUserInfo] = useState(() => {
                const saved = localStorage.getItem('sgt_state');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved).userInfo || {};
                        return {
                            fullName: parsed.fullName || '',
                            nickname: parsed.nickname || '',
                            role: parsed.role || '',
                            section: parsed.section || '',
                            gender: parsed.gender || '',
                            ageRange: parsed.ageRange || ''
                        };
                    } catch(e) {}
                }
                return { fullName: '', nickname: '', role: '', section: '', gender: '', ageRange: '' };
            });

            const [step, setStep] = useState(0); // 0=register, 1-7=questions, 8=results
            const [submitted, setSubmitted] = useState(() => {
                return localStorage.getItem('sgt_submitted') === 'true';
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isCapturing, setIsCapturing] = useState(false);
            const [capturedImage, setCapturedImage] = useState(null);
            const [refreshStatsTrigger, setRefreshStatsTrigger] = useState(0);
            const [formError, setFormError] = useState('');
            const [showAllTopGifts, setShowAllTopGifts] = useState(false);
            const [showAllBottomGifts, setShowAllBottomGifts] = useState(false);

            // จัดเก็บสถานะเมื่อกรอกคำตอบหรือเปลี่ยนข้อมูลผู้ใช้
            const saveState = (updatedAnswers, updatedUser) => {
                localStorage.setItem('sgt_state', JSON.stringify({
                    answers: updatedAnswers,
                    userInfo: updatedUser
                }));
            };

            const handleUserInfoChange = (field, val) => {
                const updatedUser = { ...userInfo, [field]: val };
                setUserInfo(updatedUser);
                saveState(answers, updatedUser);
            };

            const handleAnswerSelect = (qIdx, score) => {
                const updatedAnswers = { ...answers, [qIdx]: score };
                setAnswers(updatedAnswers);
                saveState(updatedAnswers, userInfo);
            };

            // อิงคะแนนรายหมวดหมู่ (19 ด้าน)
            const catScores = useMemo(() => {
                return CATEGORIES.map((cat, ci) => {
                    // แต่ละหมวดหมู่จะมีคำถาม 7 ข้อ: ci, ci+19, ci+38, ci+57, ci+76, ci+95, ci+114
                    const qIndices = [0,1,2,3,4,5,6].map(r => ci + r * 19);
                    const scoresList = qIndices.map(qi => answers[qi] !== undefined ? answers[qi] : null);
                    const total = scoresList.reduce((acc, v) => acc + (v !== null ? v : 0), 0);
                    return { cat, qIndices, scoresList, total };
                });
            }, [answers]);

            // คำนวณแบบจัดลำดับ Descending (จากมากไปน้อย)
            const rankedGiftsDesc = useMemo(() => {
                if (catScores.length === 0) return [];
                const sorted = [...catScores].sort((a, b) => b.total - a.total);
                let currentRank = 0;
                let lastScore = -1;
                return sorted.map((item) => {
                    if (item.total !== lastScore) {
                        currentRank++;
                        lastScore = item.total;
                    }
                    let emoji = '🎖️';
                    if (currentRank === 1) emoji = '🥇';
                    else if (currentRank === 2) emoji = '🥈';
                    else if (currentRank === 3) emoji = '🥉';
                    
                    return {
                        item,
                        rank: currentRank,
                        score: item.total,
                        emoji
                    };
                });
            }, [catScores]);

            // คำนวณแบบจัดลำดับ Ascending (จากน้อยไปมาก)
            const rankedGiftsAsc = useMemo(() => {
                if (catScores.length === 0) return [];
                const sorted = [...catScores].sort((a, b) => a.total - b.total);
                let currentRank = 0;
                let lastScore = -1;
                return sorted.map((item) => {
                    if (item.total !== lastScore) {
                        currentRank++;
                        lastScore = item.total;
                    }
                    return {
                        item,
                        rank: currentRank,
                        score: item.total,
                        emoji: '📌'
                    };
                });
            }, [catScores]);

            // ค่าสูงสุด-ต่ำสุดสำหรับสถิติเบื้องต้น
            const maxScore = useMemo(() => {
                if (catScores.length === 0) return 0;
                return Math.max(...catScores.map(c => c.total));
            }, [catScores]);

            const minScore = useMemo(() => {
                if (catScores.length === 0) return 0;
                return Math.min(...catScores.map(c => c.total));
            }, [catScores]);

            // บันทึกรูปผลลัพธ์
            const handleSaveImage = () => {
                const element = document.getElementById('personal-result-capture');
                if (!element) return;

                setIsCapturing(true);
                html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    setCapturedImage(imgData);
                    setIsCapturing(false);
                }).catch(err => {
                    console.error('Error rendering screenshot:', err);
                    alert('เกิดข้อผิดพลาดในการแปลงไฟล์รูปภาพ โปรดลองอีกครั้ง');
                    setIsCapturing(false);
                });
            };

            // ส่งข้อมูลสรุปไปประมวลผล
            const handleFormSubmit = () => {
                // ตรวจสอบความถูกต้องของการกรอกข้อมูลผู้ใช้งาน
                if (!userInfo.fullName.trim() || !userInfo.nickname.trim() || !userInfo.role || !userInfo.section || !userInfo.gender || !userInfo.ageRange) {
                    setFormError('กรุณากรอกข้อมูลและเลือกบทบาท, ส่วน, เพศ, และกลุ่มอายุให้ครบถ้วนก่อนเริ่มทำแบบทดสอบ');
                    window.scrollTo(0, 0);
                    return;
                }
                setFormError('');
                setStep(1);
            };

            const handleCalculateResults = () => {
                // ตรวจสอบว่าทำครบ 133 ข้อหรือไม่
                for (let i = 0; i < 133; i++) {
                    if (answers[i] === undefined) {
                        setFormError(`กรุณาตอบคำถามให้ครบทุกข้อก่อนการส่งสรุปผล (คุณตอบไปแล้ว ${Object.keys(answers).length} จาก 133 ข้อ)`);
                        
                        // ค้นหาหน้าที่ไม่เสร็จแล้วสลับไป
                        const targetPage = Math.floor(i / 19) + 1;
                        setStep(targetPage);
                        setTimeout(() => {
                            const el = document.getElementById(`qi_${i}`);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 200);
                        return;
                    }
                }

                setFormError('');
                setIsSubmitting(true);

                // ค้นหาของประทานที่มีผลคะแนนเด่นเพื่อส่งไปที่ Database
                const topRankGiftsText = rankedGiftsDesc
                    .filter(g => g.rank === 1)
                    .map(g => `${g.item.cat.id} (${g.item.cat.name})`)
                    .join(', ');

                // แปลงผลคะแนนแยกตามหมวดหมู่ส่งไปยังชีต
                const finalScoresMap = {};
                CATEGORIES.forEach(c => {
                    const found = catScores.find(cs => cs.cat.id === c.id);
                    finalScoresMap[c.id] = found ? found.total : 0;
                });

                const resultRecord = {
                    fullName: userInfo.fullName.trim(),
                    nickname: userInfo.nickname.trim(),
                    role: userInfo.role,
                    section: userInfo.section,
                    gender: userInfo.gender,
                    ageRange: userInfo.ageRange,
                    scores: finalScoresMap,
                    dominantType: topRankGiftsText,
                    date: new Date().toISOString()
                };

                // บันทึกประวัติในเครื่อง
                try {
                    const localHistoryStr = localStorage.getItem('sgt_history') || '[]';
                    const localHistory = JSON.parse(localHistoryStr);
                    // ป้องกันการแอดข้อมูลเดิมซ้ำโดยลบตัวที่ชนกันออก
                    const filteredHistory = localHistory.filter(i => !(i.fullName === resultRecord.fullName && i.date === resultRecord.date));
                    filteredHistory.push(resultRecord);
                    localStorage.setItem('sgt_history', JSON.stringify(filteredHistory));
                } catch(e) {
                    console.error('Error saving local history data:', e);
                }

                // ส่งเข้าคลาวด์ Google Sheets หากกำหนดไว้
                if (SCRIPT_URL) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(resultRecord),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    })
                    .then(() => console.log('Saved to Google Sheets Spreadsheet successfully!'))
                    .catch(err => console.error('Save to Sheets error:', err))
                    .finally(() => {
                        finishSubmission();
                    });
                } else {
                    finishSubmission();
                }
            };

            const finishSubmission = () => {
                setIsSubmitting(false);
                setSubmitted(true);
                localStorage.setItem('sgt_submitted', 'true');
                localStorage.setItem('sgt_results', JSON.stringify(answers));
                localStorage.setItem('sgt_userInfo', JSON.stringify(userInfo));
                setStep(8); // ไปที่หน้าสรุปผล
                setRefreshStatsTrigger(p => p + 1); // กระตุ้นการรีเฟรชสถิติ
            };

            const handleRestartTest = () => {
                if (confirm('คุณต้องการรีเซ็ตคำตอบและเริ่มต้นทำแบบประเมินใหม่อีกครั้งใช่หรือไม่?')) {
                    localStorage.removeItem('sgt_submitted');
                    localStorage.removeItem('sgt_results');
                    localStorage.removeItem('sgt_state');
                    setAnswers({});
                    setUserInfo({ fullName: '', nickname: '', role: '', section: '', gender: '', ageRange: '' });
                    setSubmitted(false);
                    setStep(0);
                    setFormError('');
                    setShowAllTopGifts(false);
                    setShowAllBottomGifts(false);
                }
            };

            // วาดกราฟเปรียบเทียบคะแนนเดี่ยว
            useEffect(() => {
                if (step !== 8 && !submitted) return;

                const ctx = document.getElementById('chart-personal-comparison');
                if (!ctx) return;

                const chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: CATEGORIES.map(c => c.id), // 'ก', 'ข', 'ค' ...
                        datasets: [{
                            label: 'คะแนนของคุณ (เต็ม 21 คะแนน)',
                            data: catScores.map(cs => cs.total),
                            backgroundColor: catScores.map((cs, index) => {
                                // สุ่มเฉดสีม่วง-น้ำเงินให้ดูหรูหรามีสีสัน
                                const hue = 250 + (index * 6);
                                return `hsla(${hue}, 70%, 55%, 0.85)`;
                            }),
                            borderColor: catScores.map((cs, index) => {
                                const hue = 250 + (index * 6);
                                return `hsl(${hue}, 70%, 45%)`;
                            }),
                            borderWidth: 1.5,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    title: (items) => {
                                        const i = items[0].dataIndex;
                                        return `${CATEGORIES[i].id} = ${CATEGORIES[i].name}`;
                                    },
                                    label: (item) => ` คะแนน: ${item.raw} / 21 คะแนน`
                                }
                            }
                        },
                        scales: {
                            y: { beginAtZero: true, max: 21, grid: { color: '#e9d5ff' } },
                            x: { grid: { display: false } }
                        }
                    }
                });

                return () => {
                    chart.destroy();
                };
            }, [step, submitted, catScores]);

            // สลับกลับหน้าสรุปผลอัตโนมัติหากทำเสร็จสิ้นไปแล้ว
            useEffect(() => {
                if (submitted) setStep(8);
            }, [submitted]);

            // ===================== RENDER TEMPLATES =====================

            // --- หน้าลงทะเบียน ---
            if (step === 0) {
                return (
                    <div className="max-w-3xl mx-auto p-4 sm:p-6 mt-4 sm:mt-10 animate-slideUp">
                        <div className="card rounded-2xl p-6 sm:p-10 shadow-xl">
                            <div className="text-center mb-8">
                                <h1 className="text-2xl sm:text-3xl font-extrabold text-indigo-800">แบบประเมินของประทานฝ่ายวิญญาณ</h1>
                            </div>

                            {formError && (
                                <div className="p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm mb-6 leading-relaxed">
                                    ⚠️ {formError}
                                </div>
                            )}

                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-sm font-semibold text-slate-700">ชื่อ-นามสกุล</label>
                                        <input
                                            type="text"
                                            placeholder="กรอกชื่อ-นามสกุลจริง"
                                            value={userInfo.fullName}
                                            onChange={(e) => handleUserInfoChange('fullName', e.target.value)}
                                            className="border border-purple-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition"
                                        />
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-sm font-semibold text-slate-700">ชื่อเล่น</label>
                                        <input
                                            type="text"
                                            placeholder="กรอกชื่อเล่น"
                                            value={userInfo.nickname}
                                            onChange={(e) => handleUserInfoChange('nickname', e.target.value)}
                                            className="border border-purple-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition"
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">

                                            value={userInfo.gender}
                                            onChange={(e) => handleUserInfoChange('gender', e.target.value)}

                                <button

            }

            // --- หน้ารายการข้อคำถาม (สลับ 7 หน้า หน้าละ 19 ข้อ) ---
            if (step >= 1 && step <= 7) {
                const startIdx = (step - 1) * 19;
                const endIdx = Math.min(startIdx + 19, 133);
                const pageQuestions = [];

                for (let i = startIdx; i < endIdx; i++) {
                    pageQuestions.push({ index: i, text: QUESTIONS[i] });
                }

                // คำนวณความคืบหน้าของชุดนี้
                const answeredThisPage = pageQuestions.filter(q => answers[q.index] !== undefined).length;
                const progressPct = Math.round((Object.keys(answers).length / 133) * 100);

                const handleNextPage = () => {
                    // ตรวจสอบว่าตอบครบทุกข้อบนหน้านี้หรือไม่
                    for (let i = startIdx; i < endIdx; i++) {
                        if (answers[i] === undefined) {
                            setFormError('กรุณาตอบคำถามในหน้านี้ให้ครบทุกข้อก่อนเลื่อนไปหน้าถัดไป');
                            const el = document.getElementById(`qi_${i}`);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            return;
                        }
                    }
                    setFormError('');
                    if (step === 7) {
                        handleCalculateResults();
                    } else {
                        setStep(step + 1);
                        window.scrollTo(0, 0);
                    }
                };

                const handlePrevPage = () => {
                    setFormError('');
                    setStep(step - 1);
                    window.scrollTo(0, 0);
                };

                return (
                    <div className="max-w-4xl mx-auto p-4 sm:p-6 mt-4 animate-slideUp">
                        {/* Progress Bar */}
                        <div className="bg-white p-4 rounded-xl border border-purple-100 shadow-sm mb-6 flex items-center justify-between gap-4">
                            <div className="flex-1">
                                <div className="flex justify-between items-center text-xs font-semibold text-indigo-700 mb-1.5">
                                    <span>ความคืบหน้าทั้งหมด</span>
                                    <span>{Object.keys(answers).length} / 133 ข้อ ({progressPct}%)</span>
                                </div>
                                <div className="w-full bg-purple-100 rounded-full h-2.5 overflow-hidden">
                                    <div className="bg-indigo-600 h-full transition-all duration-300" style={{ width: `${progressPct}%` }}></div>
                                </div>
                            </div>
                            <div className="text-right text-xs bg-indigo-50 border border-indigo-100 px-3.5 py-1.5 rounded-lg text-indigo-800 font-bold shrink-0">
                                หน้า {step} / 7
                            </div>
                        </div>

                        {formError && (

                            </div>

                                <h2 className="text-lg font-bold text-slate-800">
                                    ตอบแบบทดสอบข้อที่ {startIdx + 1} - {endIdx}
                                </h2>
                                <span className="text-xs text-slate-500 font-semibold bg-slate-50 px-2 py-1 rounded">
                                    ตอบครบถ้วนบนหน้านี้: {answeredThisPage} / {pageQuestions.length} ข้อ
                                </span>
                            </div>

                            {/* Legend */}
                            <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 grid grid-cols-2 md:grid-cols-4 gap-3 text-center mb-6">
                                {SCORE_LABELS.map((lbl, idx) => (
                                    <div key={idx} className="flex items-center gap-2 text-left bg-white p-2.5 rounded-lg border border-purple-100/50 shadow-sm">
                                        <span className="w-6 h-6 rounded-md bg-indigo-100 text-indigo-800 font-extrabold text-sm flex items-center justify-center shrink-0">
                                            {idx}
                                        </span>
                                        <span className="text-[10px] sm:text-xs text-slate-600 font-medium leading-tight">{lbl}</span>
                                    </div>
                                ))}
                            </div>

                            {/* Questions List */}

                                        <div key={q.index} id={`qi_${q.index}`} className={`pt-6 ${idx === 0 ? 'pt-0' : ''}`}>

                                                <span className="w-6 h-6 rounded-md bg-indigo-600 text-white font-bold text-xs flex items-center justify-center shrink-0 mt-0.5">

                                                <span>{q.text}</span>

                                                        key={v}
                                                        type="button"
                                                        onClick={() => handleAnswerSelect(q.index, v)}
                                                        className="flex items-center gap-2 group cursor-pointer"
                                                    >
                                                        <span className={`w-8 h-8 rounded-full border-2 font-bold text-sm flex items-center justify-center transition-all ${
                                                            score === v
                                                            ? 'bg-indigo-600 text-white border-indigo-600 scale-105 shadow-md shadow-indigo-500/20'
                                                            : 'bg-white text-slate-500 border-slate-200 group-hover:border-indigo-400 group-hover:bg-indigo-50/50'
                                                        }`}>
                                                            {v}
                                                        </span>
                                                        <span className={`text-xs ${
                                                            score === v ? 'text-indigo-700 font-bold' : 'text-slate-500'
                                                        }`}>
                                                            {SCORE_LABELS[v].split('/')[0]}

                                                    </button>

            // --- หน้าแสดงผลลัพธ์ (step === 8) ---

                        {cs.total}
                    </td>

                const abbrCells = CATEGORIES.map(c => (
                    <td key={c.id} className="p-1 border border-purple-200 bg-purple-50/20 text-slate-500 font-semibold text-[10px]" title={c.name}>

                return (
                    <div className="max-w-4xl mx-auto p-2 sm:p-6 mt-4 sm:mt-8 space-y-8">

                                        <p><span className="font-semibold text-slate-900">บทบาทการรับใช้:</span> {userInfo.role}</p>
                                        <p><span className="font-semibold text-slate-900">สังกัดส่วนงาน:</span> {userInfo.section} &nbsp;|&nbsp; <span className="font-semibold text-slate-900">เพศ:</span> {userInfo.gender} &nbsp;|&nbsp; <span className="font-semibold text-slate-900">กลุ่มอายุ:</span> {userInfo.ageRange}</p>
                                    </div>

                                        <div className="text-xs font-bold text-indigo-600 sm:mb-1 uppercase tracking-wide">ของประทานเด่นอันดับแรก</div>
                                        <div className="text-lg sm:text-2xl font-black text-indigo-700 bg-white border border-indigo-200 px-4 py-2 rounded-xl shadow-sm">
                                            {topGiftsList.map(g => g.item.cat.id).join(', ')}

                                    </div>

                                        {topGiftsToShow.map((rankObj, idx) => {
                                            const bgClass = rankObj.rank === 1 
                                                ? 'bg-amber-50/50 border-amber-200' 
                                                : rankObj.rank === 2 
                                                    ? 'bg-slate-50/80 border-slate-200' 
                                                    : rankObj.rank === 3 
                                                        ? 'bg-slate-50/60 border-slate-200' 
                                                        : 'bg-slate-50/30 border-slate-100';
                                            return (
                                                <div key={idx} className={`border rounded-xl p-4 flex items-start gap-3.5 shadow-sm transition-all ${bgClass}`}>
                                                    <div className="flex-1">
                                                        <h3 className="font-bold text-slate-800 text-sm sm:text-base">
                                                            {rankObj.item.cat.id}. {rankObj.item.cat.name}
                                                        </h3>
                                                        <p className="text-xs text-slate-500 mt-1 leading-relaxed">

                                                        <span className="inline-block px-3 py-1 bg-indigo-100 text-indigo-800 font-extrabold text-sm rounded-full">
                                                            {rankObj.score} / 21
                                                        </span>
                                                        <div className="text-[10px] text-slate-400 mt-1">คะแนน</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {rankedGiftsDesc.length > 3 && (
                                        <div className="text-center mt-3 no-print" data-html2canvas-ignore="true">
                                            <button
                                                type="button"
                                                onClick={() => setShowAllTopGifts(!showAllTopGifts)}
                                                className="inline-flex items-center gap-1 px-4 py-2 text-xs font-semibold text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-lg transition-all active:scale-95 shadow-sm"
                                            >
                                                {showAllTopGifts ? (
                                                    <>แสดงน้อยลง ▴</>

                                        </div>
                                    )}
                                </div>

                                {/* 3. หมวดของประทานที่ได้คะแนนน้อยสุด 2 รายการ */}
                                <div className="mb-6">
                                    <h2 className="text-base sm:text-lg font-bold mb-3 text-slate-800 flex items-center gap-2">
                                        <span className="w-1.5 h-4 bg-red-500 rounded-full inline-block"></span>
                                        2. หมวดของประทานที่ได้คะแนนน้อยสุด 2 รายการ
                                    </h2>
                                    <div className="grid grid-cols-1 gap-3">
                                        {bottomGiftsToShow.map((rankObj, idx) => {
                                            const bgClass = 'bg-rose-50/30 border-rose-100';
                                            return (
                                                <div key={idx} className={`border rounded-xl p-4 flex items-start gap-3.5 shadow-sm transition-all ${bgClass}`}>
                                                    <div className="flex-1">
                                                        <h3 className="font-bold text-slate-800 text-sm sm:text-base">
                                                            {rankObj.item.cat.id}. {rankObj.item.cat.name}
                                                        </h3>
                                                        <p className="text-xs text-slate-500 mt-1 leading-relaxed">
                                                            {rankObj.item.cat.desc}
                                                        </p>
                                                    </div>
                                                    <div className="text-right shrink-0">
                                                        <span className="inline-block px-3 py-1 bg-rose-100 text-rose-800 font-extrabold text-sm rounded-full">
                                                            {rankObj.score} / 21
                                                        </span>
                                                        <div className="text-[10px] text-slate-400 mt-1">คะแนน</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {rankedGiftsAsc.length > 2 && (
                                        <div className="text-center mt-3 no-print" data-html2canvas-ignore="true">
                                            <button
                                                type="button"
                                                onClick={() => setShowAllBottomGifts(!showAllBottomGifts)}
                                                className="inline-flex items-center gap-1 px-4 py-2 text-xs font-semibold text-rose-700 bg-rose-50 hover:bg-rose-100 border border-rose-200 rounded-lg transition-all active:scale-95 shadow-sm"
                                            >
                                                {showAllBottomGifts ? (
                                                    <>แสดงน้อยลง ▴</>
                                                ) : (
                                                    <>แสดงเพิ่มเติม ({rankedGiftsAsc.length - 2} รายการ) ▾</>
                                                )}
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* 4. กราฟเปรียบเทียบคะแนนของประทานฝ่ายวิญญาณ 19 ด้าน */}
                                <div className="mb-6">
                                    <h2 className="text-base sm:text-lg font-bold mb-3 text-slate-800 flex items-center gap-2">
                                        <span className="w-1.5 h-4 bg-indigo-600 rounded-full inline-block"></span>
                                        3. กราฟเปรียบเทียบคะแนนของประทานฝ่ายวิญญาณ 19 ด้าน
                                    </h2>
                                    <div className="bg-white p-3 rounded-xl border border-slate-200 shadow-inner h-64 sm:h-72 relative w-full">
                                        <canvas id="chart-personal-comparison"></canvas>
                                    </div>

                                        {CATEGORIES.map(c => (
