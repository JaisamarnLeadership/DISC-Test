                                    </div>
                                </div>

                                {/* 5. สรุปคะแนนที่คุณตอบระบุเป็นข้อ */}
                                <div>
                                    <h2 className="text-base sm:text-lg font-bold mb-3 text-slate-800 flex items-center gap-2">
                                        <span className="w-1.5 h-4 bg-indigo-600 rounded-full inline-block"></span>
                                        4. สรุปคะแนนที่คุณตอบระบุเป็นข้อ
                                    </h2>
                                    <div className="overflow-x-auto border border-purple-200 rounded-xl shadow-sm">
                                        <table className="w-full text-center border-collapse table-layout-fixed min-w-[760px]">
                                            <thead>
                                                <tr>
                                                    <th className="p-2 border border-purple-200 bg-indigo-50/80 text-indigo-950 font-bold text-xs w-[80px]">ด้าน</th>
                                                    {colHeads}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {rowsHtml}
                                                <tr className="bg-indigo-50/20 font-black">
                                                    <td className="p-2 border border-purple-200 text-indigo-800 text-xs">รวมคะแนน</td>
                                                    {totalCells}
                                                </tr>
                                                <tr>
                                                    <td className="p-1 border border-purple-200 bg-purple-50/10 text-slate-400 font-semibold text-[9px]">ย่อหมวด</td>
                                                    {abbrCells}
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            {/* 6. ปุ่มคำสั่งพิมพ์/บันทึกรูป */}
                            <div className="mt-8 pt-5 border-t border-purple-100 flex flex-col sm:flex-row gap-3 justify-center px-4">
                                <button
                                    onClick={handleSaveImage}
                                    disabled={isCapturing}
                                    className={`${
                                        isCapturing ? 'bg-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:scale-[1.01]'
                                    } text-white font-bold py-3.5 px-7 rounded-xl transition shadow-md hover:shadow-lg flex items-center justify-center gap-2 w-full sm:w-auto text-sm sm:text-base`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                    </svg>
                                    {isCapturing ? 'กำลังแคปเจอร์รูปภาพ...' : 'บันทึกผลลัพธ์เป็นรูปภาพ'}
                                </button>
                                <button
                                    onClick={() => window.print()}
                                    className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-7 rounded-xl transition shadow-md w-full sm:w-auto text-sm sm:text-base flex items-center justify-center gap-2"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
                                    </svg>
                                    พิมพ์รายงาน / เซฟเป็น PDF
                                </button>
                            </div>

                            {/* 7. ข้อมูลสถิติของคนทั้งหมด */}
                            <StatsCharts 
                                refreshTrigger={refreshStatsTrigger} 
                                userInfo={userInfo}
                                userScores={catScores.reduce((acc, cs) => {
                                    acc[cs.cat.id] = cs.total;
                                    return acc;
                                }, {})}
                            />

                            {/* ปุ่มรีสตาร์ท */}
                            <div className="mt-8 text-center border-t border-purple-100 pt-6">
                                <button
                                    onClick={handleRestartTest}
                                    className="bg-red-100 hover:bg-red-200 text-red-700 font-bold py-3 px-6 rounded-xl transition text-sm shadow-sm"
                                >
                                    🔄 ทำแบบประเมินใหม่อีกครั้ง
                                </button>
                            </div>
                        </div>

                        {/* Beautiful Glassmorphism Modal for Image Save on Mobile Devices */}
                        {capturedImage && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 animate-fadeIn">
                                <div className="bg-white rounded-2xl max-w-lg w-full p-5 shadow-2xl flex flex-col max-h-[92vh] overflow-hidden border border-slate-100 animate-slideUp">
                                    <div className="flex justify-between items-center mb-3 border-b pb-2">
                                        <h3 className="text-base sm:text-lg font-bold text-slate-800 flex items-center gap-1.5">📲 บันทึกภาพลงคลังรูปภาพ</h3>
                                        <button
                                            onClick={() => setCapturedImage(null)}
                                            className="text-slate-400 hover:text-slate-650 text-2xl font-bold p-1 leading-none transition-colors"
                                        >
                                            &times;
                                        </button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto mb-4 border border-slate-200 rounded-xl bg-slate-50 p-2 flex justify-center items-start">
                                        <img
                                            src={capturedImage}
                                            alt="Spiritual Gifts Test Result"
                                            className="max-w-full h-auto rounded-lg shadow-sm border border-slate-200"
                                        />
                                    </div>

                                    <div className="bg-emerald-50 border border-emerald-200 text-emerald-850 p-3.5 rounded-xl text-xs sm:text-sm mb-4 leading-relaxed font-medium text-center">
                                        📲 <strong>วิธีเซฟลงมือถือ:</strong> ให้คุณ<strong>กดค้างที่รูปภาพด้านบน</strong> แล้วเลือก <strong className="text-emerald-700 font-bold">"บันทึกรูปภาพ" (Save Image)</strong> หรือ <strong className="text-emerald-700 font-bold">"เพิ่มไปยังแอปรูปภาพ"</strong> เพื่อนำรูปเข้าคลังภาพโดยตรงและแชร์ให้พี่เลี้ยงหรือผู้นำคริสตจักรได้เลยครับ!
                                    </div>

                                    <div className="flex gap-2 justify-end border-t pt-3">
                                        <button
                                            onClick={() => setCapturedImage(null)}
                                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition text-center text-xs sm:text-sm shadow-md"
                                        >
                                            เสร็จสิ้น / ปิดหน้าต่าง
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // --- หน้าแสดงสถิติเดี่ยว (step === 9) ---
            if (step === 9) {
                return (
                    <div className="max-w-4xl mx-auto p-2 sm:p-6 mt-4 sm:mt-8 space-y-8 animate-slideUp">
                        <div className="card rounded-2xl p-4 sm:p-8 shadow-xl bg-white">
                            <div className="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b pb-4 gap-4">
                                <div>
                                    <h1 className="text-xl sm:text-2xl font-extrabold text-indigo-800 flex items-center gap-2">
                                        📊 สถิติภาพรวมของผู้ทำแบบประเมิน
                                    </h1>
                                    <p className="text-xs text-slate-500 mt-1">ข้อมูลสรุปของประทานฝ่ายวิญญาณของผู้ทำแบบประเมินทั้งหมด</p>
                                </div>
                                <button
                                    onClick={() => setStep(0)}
                                    className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 px-5 rounded-xl transition text-sm shadow-sm active:scale-95 flex items-center gap-1 w-full sm:w-auto justify-center"
                                >
                                    ← กลับหน้าหลัก
                                </button>
                            </div>
                            
                            <StatsCharts 
                                refreshTrigger={refreshStatsTrigger} 
                                userInfo={userInfo}
                                userScores={{}}
                            />

                            <div className="mt-8 text-center border-t border-purple-100 pt-6">
                                <button
                                    onClick={() => setStep(0)}
                                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-8 rounded-xl transition text-sm shadow-md active:scale-95"
                                >
                                    ← กลับหน้าลงทะเบียนและเริ่มทำแบบทดสอบ
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
